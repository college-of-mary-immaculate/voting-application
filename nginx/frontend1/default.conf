server {
    listen 80;
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
        add_header X-App "FRONTEND1";
        sub_filter </body> '<h1 style="color:red;">FRONTEND 1</h1></body>';
        sub_filter_types text/html;
        sub_filter_once off;
    }
}
