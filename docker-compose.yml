version: "3.9"

services:
  mysql_master:
    image: mariadb:10.3
    container_name: mysql_master
    env_file:
      - ./master/mysql_master.env
    ports:
      - "4406:3306"
    volumes:
      - master_data:/var/lib/mysql
      - ./master/conf/mysql.conf.cnf:/etc/mysql/conf.d/mysql.conf.cnf
      - ./db:/db

  mysql_slave:
    image: mariadb:10.3
    container_name: mysql_slave
    env_file:
      - ./slave/mysql_slave.env
    depends_on:
      - mysql_master
    ports:
      - "5506:3306"
    volumes:
      - slave_data:/var/lib/mysql
      - ./slave/conf/mysql.conf.cnf:/etc/mysql/conf.d/mysql.conf.cnf
      - ./db:/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voting_backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "3000:3000"
    depends_on:
      - mysql_master
      - mysql_slave
    env_file:
      - ./backend/.env
    command: sh -c "npm install && npm start"

  ui:
    build:
      context: ./UI
      dockerfile: Dockerfile
    container_name: voting_ui
    working_dir: /app
    volumes:
      - ./UI:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host"

  frontend1:
    image: nginx:latest
    container_name: frontend1
    volumes:
      - ./UI/dist:/usr/share/nginx/html
      - ./nginx/frontend1/default.conf:/etc/nginx/conf.d/default.conf

  frontend2:
    image: nginx:latest
    container_name: frontend2
    volumes:
      - ./UI/dist:/usr/share/nginx/html
      - ./nginx/frontend2/default.conf:/etc/nginx/conf.d/default.conf

  frontend3:
    image: nginx:latest
    container_name: frontend3
    volumes:
      - ./UI/dist:/usr/share/nginx/html
      - ./nginx/frontend3/default.conf:/etc/nginx/conf.d/default.conf

  loadbalancer:
    image: nginx:latest
    container_name: nginx_lb
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"
    depends_on:
      - frontend1
      - frontend2
      - frontend3

volumes:
  master_data:
  slave_data: